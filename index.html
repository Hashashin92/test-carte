<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassin Mouriss - Carte de Visite Digitale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8; /* Bleu tech */
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --glow-color: rgba(56, 189, 248, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 380px;
            border-radius: 28px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        /* Logo carré avec effet de surbrillance (Glow) */
        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px; /* Carré arrondi moderne */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 42px;
            font-weight: 700;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 25px var(--glow-color); /* L'effet de surbrillance */
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .job-title {
            color: var(--accent-color);
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .company-name {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Bouton Contact Principal */
        .btn-save {
            background-color: var(--text-main);
            color: var(--bg-color);
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        /* Boutons de réseaux / liens */
        .btn-link {
            background-color: rgba(255,255,255,0.04);
            color: var(--text-main);
        }

        .btn-link:hover, .btn-link:active {
            background-color: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        /* Style spécial pour le bouton Tetris */
        .btn-game {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-color);
            margin-top: 10px;
        }

        .footer-text {
            margin-top: 35px;
            font-size: 0.8rem;
            color: var(--text-sub);
            opacity: 0.6;
        }

        .btn i {
            margin-right: 10px;
            font-style: normal;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            YM
        </div>

        <h1>Yassin Mouriss</h1>
        <div class="job-title">Associé Dirigeant</div>
        <div class="company-name">Technologie Maintenance Informatique</div>

        <div class="button-stack">
            <a href="yassin_mouriss.vcf" download="Yassin_Mouriss.vcf" class="btn btn-save">
                <i>💾</i> Enregistrer le contact
            </a>

            <a href="tel:+33661783855" class="btn btn-link">
                <i>📞</i> Appeler
            </a>

            <a href="https://wa.me/33661783855" class="btn btn-link">
                <i>💬</i> WhatsApp
            </a>

            <a href="mailto:yassin.mouriss@technologie-maintenance.com" class="btn btn-link">
                <i>✉️</i> Email Professionnel
            </a>

            <a href="https://www.technologie-maintenance.com/" target="_blank" class="btn btn-link">
                <i>🌐</i> Site Web

            </a>
        </div>

        <div class="footer-text">
            Technologie Maintenance Informatique © 2026
        </div>
    </div>

</body>
</html>
