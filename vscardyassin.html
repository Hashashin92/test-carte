<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassin Mouriss - Digital Business Card</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8; /* Bleu technologique */
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Effet de surbrillance sur le logo carré */
        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: var(--accent-color);
            border-radius: 15px; /* Carré légèrement arrondi */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4); /* Glow effect */
            overflow: hidden;
            border: 2px solid var(--accent-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .title {
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .company {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .links-container {
            display: grid;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        .btn-vcf {
            background: var(--text-main);
            color: var(--bg-color);
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            YM
        </div>

        <h1>Yassin Mouriss</h1> 
        <div class="title">Associé Dirigeant</div> 
        <div class="company">Technologie Maintenance Informatique</div> 

        <div class="links-container">
            <a href="yassin_mouriss.vcf" class="btn btn-vcf">💾 Enregistrer le contact</a>

            <a href="tel:+33661783855" class="btn">📞 Appeler</a> 
            <a href="https://wa.me/33661783855" class="btn">💬 WhatsApp</a> 
            <a href="mailto:yassin.mouriss@technologie-maintenance.com" class="btn">✉️ Email</a> 
            <a href="https://www.technologie-maintenance.com/" target="_blank" class="btn">🌐 Site Web</a> 
        </div>

        <div class="footer">
            Scannez pour rester connecté
        </div>
    </div>

</body>
</html>
